<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Noteworthy - Note Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1717cf",
              "background-light": "#f6f6f8",
              "background-dark": "#111121",
            },
            fontFamily: {
              display: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100"
  >
    <div class="relative flex flex-col w-full h-screen overflow-hidden">
      <!-- Top Navigation Bar -->
      <header
        class="flex items-center justify-between px-6 py-3 bg-white border-b border-slate-200 dark:border-slate-800 dark:bg-background-dark shrink-0"
      >
        <div class="flex items-center gap-4">
          <div class="text-primary">
            <span class="text-3xl material-symbols-outlined">edit_note</span>
          </div>
          <h2 class="text-lg font-bold tracking-tight">Noteworthy</h2>
        </div>
        <div class="flex items-center gap-3">
          <button
            class="flex items-center justify-center h-10 px-4 text-sm font-medium transition-colors rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200"
          >
            <span class="mr-2 text-xl material-symbols-outlined">share</span>
            Share
          </button>
          <div class="w-px h-8 mx-2 bg-slate-200 dark:bg-slate-800"></div>
          <div
            class="bg-center bg-no-repeat bg-cover border rounded-full aspect-square size-9 border-slate-200 dark:border-slate-700"
            data-alt="User profile avatar placeholder"
            style="
              background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD2W-WXC527rSAj3PsWbtgmkGjK9Df7Wa_9yRD7HBFZ2LkRLbyH-T7v2MLaIQu-bbwPrtK6E7yp1ENNSWp9n7CbYumqgvbr-OWo2xvqWZpVaLO_JlTvjRFRAxFEKJ2dy0bxk5pMow21MzsaFASvzh1S_GTHJiJuH-HXCITr2G_VtdbDh19uh3L6pievuQfW5MtbhZeae1D2UuVjkK1W-5dseYqH2rOHJTWBr8gs1RDIHcdoe5XTT_dk7ITqM1fVtJYuDKzXqDXXnwl-');
            "
          ></div>
        </div>
      </header>
      <main class="flex flex-1 overflow-hidden">
        <!-- Main Editor Area -->
        <div
          class="flex flex-col flex-1 overflow-y-auto bg-white dark:bg-background-dark/50"
        >
          <div class="flex flex-col w-full max-w-4xl gap-6 px-8 py-10 mx-auto">
            <!-- Title Input -->
            <div class="w-full">
              <input
                class="w-full p-0 text-4xl font-bold bg-transparent border-none focus:ring-0 placeholder:text-slate-300 dark:placeholder:text-slate-700"
                placeholder="Untitled Note"
                type="text"
                value="Quarterly Strategic Planning 2024"
              />
            </div>
            <!-- Editor Toolbar -->
            <div
              class="flex items-center gap-1 py-2 border-y border-slate-100 dark:border-slate-800"
            >
              <button
                class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400"
              >
                <span class="material-symbols-outlined">format_bold</span>
              </button>
              <button
                class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400"
              >
                <span class="material-symbols-outlined">format_italic</span>
              </button>
              <button
                class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400"
              >
                <span class="material-symbols-outlined"
                  >format_list_bulleted</span
                >
              </button>
              <button
                class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400"
              >
                <span class="material-symbols-outlined">link</span>
              </button>
              <button
                class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-slate-600 dark:text-slate-400"
              >
                <span class="material-symbols-outlined">image</span>
              </button>
              <div class="flex-1"></div>
              <span class="text-xs font-medium text-slate-400"
                >1,240 words</span
              >
            </div>
            <!-- Editor Body -->
            <textarea
              class="w-full flex-1 resize-none border-none focus:ring-0 bg-transparent text-lg leading-relaxed text-slate-700 dark:text-slate-300 min-h-[500px] p-0"
              placeholder="Start typing your ideas here..."
            >
The primary focus for this quarter will be on scaling our infrastructure to support the projected 40% growth in user activity. Key milestones include:

1. Finalizing the migration to the new high-performance database cluster.
2. Implementing the enhanced security protocols across all microservices.
3. Launching the revamped user dashboard with real-time analytics.

Our design philosophy remains centered on simplicity and user-centricity. Every interaction should feel intentional and friction-less. 

"Design is not just what it looks like and feels like. Design is how it works." — Steve Jobs</textarea
            >
          </div>
        </div>
        <!-- Sidebar Panel -->
        <aside
          class="flex flex-col gap-8 p-6 overflow-y-auto border-l w-80 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-background-dark"
          id="SidePanel"
        >
          <!-- StatusSection Component -->
          <section class="flex flex-col gap-1">
            <h3
              class="text-xs font-bold tracking-widest uppercase text-slate-400"
            >
              Status
            </h3>
            <div
              class="flex items-center gap-2 mt-1 text-sm text-slate-600 dark:text-slate-400"
            >
              <span class="text-sm material-symbols-outlined">schedule</span>
              <span>Last updated: Oct 24, 14:20</span>
            </div>
          </section>
          <!-- PrioritySection Component -->
          <section class="flex flex-col gap-3">
            <h3
              class="text-xs font-bold tracking-widest uppercase text-slate-400"
            >
              Priority
            </h3>
            <div class="flex items-center gap-2" id="priority-selector">
              <button
                class="flex-1 px-3 py-2 text-xs font-bold transition-all border-2 rounded-lg border-primary bg-primary/10 text-primary"
                data-priority="high"
              >
                High
              </button>
              <button
                class="flex-1 px-3 py-2 text-xs font-bold transition-all border-2 rounded-lg border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
                data-priority="medium"
              >
                Medium
              </button>
              <button
                class="flex-1 px-3 py-2 text-xs font-bold transition-all border-2 rounded-lg border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800"
                data-priority="low"
              >
                Low
              </button>
            </div>
          </section>
          <!-- LabelsSection Component -->
          <section class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
              <h3
                class="text-xs font-bold tracking-widest uppercase text-slate-400"
              >
                Labels
              </h3>
              <button
                aria-label="Add Label"
                class="transition-colors text-primary hover:text-primary/80"
              >
                <span class="text-xl material-symbols-outlined"
                  >add_circle</span
                >
              </button>
            </div>
            <div class="flex flex-wrap gap-2" id="label-container">
              <!-- Dynamic Label Component Instance -->
              <div
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/20 text-primary text-xs font-semibold group"
              >
                <span>Work</span>
                <button
                  aria-label="Remove Work label"
                  class="inline-flex hover:text-primary/70"
                >
                  <span class="text-sm material-symbols-outlined">close</span>
                </button>
              </div>
              <div
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/20 text-primary text-xs font-semibold group"
              >
                <span>Strategic</span>
                <button
                  aria-label="Remove Strategic label"
                  class="inline-flex hover:text-primary/70"
                >
                  <span class="text-sm material-symbols-outlined">close</span>
                </button>
              </div>
              <div
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/20 text-primary text-xs font-semibold group"
              >
                <span>Q4-2024</span>
                <button
                  aria-label="Remove Q4-2024 label"
                  class="inline-flex hover:text-primary/70"
                >
                  <span class="text-sm material-symbols-outlined">close</span>
                </button>
              </div>
            </div>
          </section>
          <!-- SidebarActions Component -->
          <div class="flex flex-col gap-3 mt-auto">
            <button
              class="flex items-center justify-center w-full gap-2 py-3 font-bold text-white transition-opacity bg-primary rounded-xl hover:opacity-90"
              id="save-note-btn"
            >
              <span class="material-symbols-outlined">save</span>
              Save Changes
            </button>
            <button
              class="flex items-center justify-center w-full gap-2 py-3 font-bold text-red-600 transition-colors border border-red-200 dark:border-red-900/30 dark:text-red-400 rounded-xl hover:bg-red-50 dark:hover:bg-red-950/20"
              id="delete-note-btn"
            >
              <span class="material-symbols-outlined">delete</span>
              Delete Note
            </button>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
